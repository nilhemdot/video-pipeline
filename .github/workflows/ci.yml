name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff==0.5.0
      - run: ruff check backend/ tests/ --select=E,F,W --ignore=E501

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install mypy pydantic
      - run: mypy backend/search_and_index/api_models.py --ignore-missing-imports || true

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest==8.0.0 pytest-cov==5.0.0 pydantic==2.7.0 fastapi==0.115.0 httpx==0.27.0
      - name: Run unit tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=backend/search_and_index \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-branch
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30
      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/
          retention-days: 7

  frontend-lint:
    name: Frontend lint (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npx eslint src/ --max-warnings=0 || true
      - name: Lint summary
        run: echo "ESLint run complete. Warnings treated as non-blocking for now."

  frontend-build:
    name: Frontend build (Vite)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify dist output
        run: |
          if [ ! -d dist ]; then
            echo "ERROR: dist/ directory not created"
            exit 1
          fi
          echo "Build output OK: $(ls dist/ | wc -l) files in dist/"

  smoke-tests:
    name: API smoke test validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate smoke test file
        run: |
          pip install requests
          python -c "import ast; ast.parse(open('test_api_smoke.py').read())"
          echo "Smoke test file is syntactically valid."

  validate-config:
    name: Validate config files
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate JSON files
        run: |
          for f in package.json client/package.json desktop/package.json; do
            python -c "import json; json.load(open('$f'))" || { echo "INVALID: $f"; exit 1; }
            echo "  OK: $f"
          done
      - name: Validate Python syntax
        run: |
          for f in $(find backend/ -name '*.py' -type f); do
            python -c "import ast; ast.parse(open('$f').read())" || { echo "SYNTAX ERROR: $f"; exit 1; }
          done
          echo "All Python files have valid syntax."
